# ==============================================================
# Aplicacion
# ==============================================================
spring.application.name=bank
server.port=8081

# ==============================================================
# Base de Datos SQL – MySQL (clientes, cuentas, prestamos, transferencias)
# ==============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/bankdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==============================================================
# Base de Datos NoSQL – MongoDB (bitacora de operaciones / auditoria)
# ==============================================================
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=bank_audit
